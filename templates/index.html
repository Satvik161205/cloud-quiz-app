{% extends "base.html" %}

{% block title %}Welcome - Quiz App{% endblock %}

{% block extra_css %}
<style>
    .hero {
        text-align: center;
    }

    .logo {
        font-size: 80px;
        margin-bottom: 20px;
        animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    h1 {
        font-size: 42px;
        margin-bottom: 15px;
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.9);
        font-size: 18px;
        margin-bottom: 40px;
    }

    .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }

    .feature {
        text-align: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        transition: all 0.3s ease;
    }

    .feature:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
    }

    .feature-icon {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .feature-text {
        color: white;
        font-size: 14px;
        font-weight: 500;
    }

    .btn-group {
        display: flex;
        gap: 15px;
    }

    .btn-group .btn {
        flex: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="hero">
    <div class="logo">🧠</div>
    <h1>Quiz Master</h1>
    <p class="subtitle">Test your knowledge and challenge yourself!</p>
    
    <div class="features">
        <div class="feature">
            <div class="feature-icon">⚡</div>
            <div class="feature-text">Fast & Fun</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🏆</div>
            <div class="feature-text">Track Scores</div>
        </div>
        <div class="feature">
            <div class="feature-icon">🎯</div>
            <div class="feature-text">Challenge</div>
        </div>
    </div>

    <div class="btn-group">
        <a href="{{ url_for('login') }}" class="btn">Login</a>
        <a href="{{ url_for('register') }}" class="btn secondary-btn">Register</a>
    </div>
</div>
{% endblock %}
