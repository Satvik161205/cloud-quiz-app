{% extends "base.html" %}

{% block title %}Quiz - Quiz App{% endblock %}

{% block extra_css %}
<style>
    .container {
        max-width: 700px;
    }

    .quiz-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .quiz-icon {
        font-size: 50px;
        margin-bottom: 15px;
    }

    .progress-container {
        background: rgba(255, 255, 255, 0.2);
        height: 10px;
        border-radius: 10px;
        margin-bottom: 30px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #f093fb, #f5576c);
        transition: width 0.5s ease;
        border-radius: 10px;
    }

    .question-card {
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        margin-bottom: 30px;
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .question-number {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        margin-bottom: 15px;
        font-weight: 500;
    }

    .question-text {
        color: white;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 25px;
        line-height: 1.5;
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .option {
        background: rgba(255, 255, 255, 0.1);
        padding: 18px 20px;
        border-radius: 12px;
        border: 2px solid transparent;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 15px;
        position: relative;
    }

    .option:hover {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateX(5px);
    }

    .option input[type="radio"] {
        appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid white;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        margin: 0;
    }

    .option input[type="radio"]:checked {
        background: linear-gradient(135deg, #f093fb, #f5576c);
        border-color: white;
    }

    .option input[type="radio"]:checked::after {
        content: '✓';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 14px;
        font-weight: bold;
    }

    .option-text {
        flex: 1;
    }

    .option.selected {
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.5);
    }

    .quiz-actions {
        display: flex;
        gap: 15px;
    }

    .quiz-actions button,
    .quiz-actions a {
        flex: 1;
    }

    .back-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .timer {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 15px 25px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        z-index: 1000;
        display: none;
    }

    @media (max-width: 600px) {
        .timer {
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        
        .question-text {
            font-size: 18px;
        }
        
        .quiz-actions {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="quiz-header">
    <div class="quiz-icon">🧠</div>
    <h2>Quiz Time!</h2>
</div>

<div class="progress-container">
    <div class="progress-bar" style="width: {{ (current / total) * 100 }}%"></div>
</div>

<form method="POST" action="{{ url_for('quiz') }}" id="quizForm">
    <div class="question-card">
        <div class="question-number">Question {{ current }} of {{ total }}</div>
        <div class="question-text">{{ question.question_text }}</div>
        
        <div class="options">
            <label class="option" for="option1">
                <input type="radio" name="answer" value="{{ question.option1 }}" id="option1" required>
                <span class="option-text">{{ question.option1 }}</span>
            </label>
            <label class="option" for="option2">
                <input type="radio" name="answer" value="{{ question.option2 }}" id="option2" required>
                <span class="option-text">{{ question.option2 }}</span>
            </label>
            <label class="option" for="option3">
                <input type="radio" name="answer" value="{{ question.option3 }}" id="option3" required>
                <span class="option-text">{{ question.option3 }}</span>
            </label>
            <label class="option" for="option4">
                <input type="radio" name="answer" value="{{ question.option4 }}" id="option4" required>
                <span class="option-text">{{ question.option4 }}</span>
            </label>
        </div>
    </div>

    <div class="quiz-actions">
        <a href="{{ url_for('dashboard') }}" class="btn back-btn">← Dashboard</a>
        <button type="submit">Next Question →</button>
    </div>
</form>

<div class="timer" id="timer">
    ⏱️ <span id="time">00:00</span>
</div>

<script>
    document.querySelectorAll('.option').forEach(option => {
        option.addEventListener('click', function() {
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            this.classList.add('selected');
            
            const radio = this.querySelector('input[type="radio"]');
            if (radio) {
                radio.checked = true;
            }
        });
    });

    document.getElementById('quizForm').addEventListener('submit', function(e) {
        const selectedOption = document.querySelector('input[name="answer"]:checked');
        if (!selectedOption) {
            e.preventDefault();
            alert('Please select an answer before proceeding!');
        }
    });
</script>
{% endblock %}
